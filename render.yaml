services:
  - type: web
    name: ukuu-hr-csharp
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
        value: "false"
      # ── Phase 7: Prisma Postgres (managed PostgreSQL at db.prisma.io) ──
      # Production connection string — set in Render dashboard as a secret
      # (or via the Prisma Console API / Prisma CLI). Local dev can use the
      # same value by exporting POSTGRES_CONNECTION_STRING before `dotnet run`.
      - key: POSTGRES_CONNECTION_STRING
        sync: false  # marks this as a secret — set manually in Render dashboard
      # Optional: SQLite fallback for local dev (used only when POSTGRES_CONNECTION_STRING unset)
      - key: ConnectionString_SqlitePath
        value: "ukuuhr.db"
      # ── Phase 8: Skip demo data seeding in production ──
      # Set to "false" to skip the demo seed (8 fictional employees, 7 demo
      # devices, sample attendance/payroll/leave/holidays). Schema is still
      # created via EnsureCreatedAsync, but zero rows are inserted.
      - key: SEED_DEMO_DATA
        value: "false"
      # ── Resend email API key ──
      # Used for transactional emails (payslip delivery, leave approvals, etc.)
      # Get your key at https://resend.com/api-keys
      - key: RESEND_API_KEY
        value: "re_KFnWFKRB_KTw4irSgKsaJyENfQ2LM1MHA"
