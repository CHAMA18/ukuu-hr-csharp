name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish Windows x64
        run: dotnet publish UkuuHr.Desktop/UkuuHr.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/windows
      - name: Publish macOS arm64
        run: dotnet publish UkuuHr.Desktop/UkuuHr.Desktop.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/macos
      - name: Zip Windows
        run: cd ./publish/windows && zip -r ../../UkuuHr-Windows-x64.zip . && cd ../..
      - name: Zip macOS
        run: cd ./publish/macos && zip -r ../../UkuuHr-macOS-arm64.zip . && cd ../..
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-apps
          path: |
            ./UkuuHr-Windows-x64.zip
            ./UkuuHr-macOS-arm64.zip
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ukuu HR Desktop ${{ github.ref_name }}
          body: |
            ## Downloads
            - **UkuuHr-Windows-x64.zip** — Windows 10+, unzip and run UkuuHr.exe
            - **UkuuHr-macOS-arm64.zip** — macOS 11+ (Apple Silicon), unzip and run UkuuHr
          files: |
            ./UkuuHr-Windows-x64.zip
            ./UkuuHr-macOS-arm64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
