name: Build Desktop Apps (Windows + macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish Windows
        run: |
          dotnet publish UkuuHr.Desktop/UkuuHr.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/windows
      - name: Zip Windows
        run: Compress-Archive -Path ./publish/windows/* -DestinationPath ./UkuuHr-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: UkuuHr-Windows-x64
          path: ./UkuuHr-Windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Publish macOS
        run: |
          dotnet publish UkuuHr.Desktop/UkuuHr.Desktop.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o ./publish/macos
      - name: Zip macOS
        run: cd ./publish/macos && zip -r ../../../UkuuHr-macOS-arm64.zip . && cd ../../..
      - uses: actions/upload-artifact@v4
        with:
          name: UkuuHr-macOS-arm64
          path: ./UkuuHr-macOS-arm64.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: UkuuHr-Windows-x64
          path: ./downloads
      - uses: actions/download-artifact@v4
        with:
          name: UkuuHr-macOS-arm64
          path: ./downloads
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ukuu HR Desktop ${{ github.ref_name }}
          body: |
            ## Downloads

            ### Windows
            - **UkuuHr-Windows-x64.zip** — Download, unzip, run UkuuHr.exe

            ### macOS
            - **UkuuHr-macOS-arm64.zip** — Download, unzip, run UkuuHr

            ### Also available as PWA
            Visit https://ukuu-hr-csharp.onrender.com in Chrome/Edge, click the install icon to install as a desktop app.
          files: ./downloads/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
